experiment_id: cytokine_gpc3_liver_low_antigen_local_llm
disease_context: hepatocellular carcinoma
tumor_type: liver cancer
car_target_antigen: GPC3
antigen_density_condition: low
engineering_variable: cytokine_payload
candidate_interventions: [control, IL-2, IL-7, IL-12, IL-15, IL-18]
biological_endpoints:
  - tumor burden
  - CAR-T expansion
  - CAR-T persistence
  - exhaustion fraction
  - cytotoxicity
  - IFN-gamma dynamics
  - hypoxia dynamics
  - PD-L1/TME remodeling signal
simulator_choice: physicell
replicates: 3
random_seed: 1729
parameter_sweep:
  antigen_density: [0.2]
  car_t_dose: [1.0]
  tumor_burden: [1.0]
  tme_severity: [0.6]
output_dir: outputs/manuscript_local_llm
literature:
  mode: curated
  curated_path: data/manuscript_literature/curated_papers.json
  max_results_per_query: 8
  download_papers: false
  max_downloads: 10
  download_timeout_seconds: 30
  chunk_chars: 3500
  chunk_overlap_chars: 350
  email: null
workflow:
  search_planning_source: deterministic
  evidence_source: hybrid
  critique_source: llm
llm:
  provider: openai_compatible
  mode: llm
  model: local-model-name-here
  base_url: http://127.0.0.1:8000/v1
  api_key_env: LOCAL_LLM_API_KEY
  temperature: 0
  seed: 1729
  save_raw_responses: true
  schema_validation: true
  max_retries: 1
manual_parameter_overrides: {}
