name: tests

on:
  pull_request:
  push:
    branches:
      - main
      - integration/reviewer-response-stack

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Check reviewer-response wording
        run: python scripts/check_reviewer_response_consistency.py
